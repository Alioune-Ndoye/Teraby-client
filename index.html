<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d1b2a" />
    <meta name="robots" content="index, follow" />

    <!-- SEO -->
    <title>Teraby — Nettoyage Luxe, Réinventé</title>
    <meta name="description" content="Services de nettoyage résidentiel et commercial haut de gamme. Là où la précision rencontre la perfection. Réservez votre expérience Teraby dès aujourd'hui." />
    <meta name="keywords" content="nettoyage luxe, service nettoyage premium, nettoyage résidentiel, nettoyage commercial, nettoyage profond, emménagement déménagement" />

    <!-- Open Graph -->
    <meta property="og:title" content="Teraby — Nettoyage Luxe, Réinventé" />
    <meta property="og:description" content="Services de nettoyage résidentiel et commercial haut de gamme. Là où la précision rencontre la perfection." />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="fr_FR" />

    <!-- Preload hero background — critical LCP element -->
    <link
      rel="preload"
      as="image"
      href="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=1600&fit=crop&q=60&auto=format"
      fetchpriority="high"
    />

    <!-- Fonts — non-blocking load to eliminate render-blocking resource -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,800;1,400&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,800;1,400&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet"
      />
    </noscript>
  <style>
    #preloader {
      position: fixed;
      inset: 0;
      background: #0d1b2a;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #preloader.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .preloader-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #c9a96e;
      margin: 0 5px;
      animation: preloader-pulse 1.2s ease-in-out infinite;
    }
    .preloader-dot:nth-child(2) { animation-delay: 0.2s; }
    .preloader-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes preloader-pulse {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40% { transform: scale(1.2); opacity: 1; }
    }
  </style>
  </head>
  <body>
    <div id="preloader">
      <div style="display:flex;align-items:center;">
        <div class="preloader-dot"></div>
        <div class="preloader-dot"></div>
        <div class="preloader-dot"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
